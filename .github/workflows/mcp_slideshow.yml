name: Generate MCP slideshow

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  mcp-slideshow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 -m pip install --upgrade Pillow
      - run: python3 scripts/make_mcp_slideshow.py
      - uses: actions/upload-artifact@v4
        with:
          name: mcp-slideshow-${{ github.run_id }}
          path: runs_mcp/**
          if-no-files-found: error
          retention-days: 30
